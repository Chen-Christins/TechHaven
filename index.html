<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <!-- 防止暗色主题导航时的白色闪烁 - 立即执行 -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (systemDark ? 'dark' : 'light');

        // 立即设置主题到HTML元素
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        // 立即设置背景色，防止FOUC
        const bgColor = theme === 'dark' ? '#0f1419' : '#ffffff';
        const textColor = theme === 'dark' ? '#f7fafc' : '#1e293b';

        document.documentElement.style.backgroundColor = bgColor;
        document.documentElement.style.color = textColor;
        document.body.style.backgroundColor = bgColor;
        document.body.style.color = textColor;
      })();
    </script>
    <style>
      /* 防止FOUC (Flash of Unstyled Content) */
      html, body {
        opacity: 1 !important;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      html {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        height: 100%;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        height: auto;
      }

      #root {
        min-height: 100vh;
        background-color: inherit;
        height: auto;
      }

      /* 确保主题变量在React加载前就可用 */
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-tertiary: #f1f5f9;
        --bg-quaternary: #e2e8f0;
        --bg-hover: #f1f5f9;
        --bg-active: #e2e8f0;
        --bg-accent: #f0f7ff;
        --bg-inverse: #1a202c;

        --text-primary: #1a202c;
        --text-secondary: #4a5568;
        --text-tertiary: #718096;
        --text-quaternary: #a0aec0;
        --text-inverse: #ffffff;
        --text-placeholder: #a0aec0;
        --text-muted: #94a3b8;

        --border-primary: #e2e8f0;
        --border-secondary: #cbd5e0;
        --border-tertiary: #a0aec0;
        --border-light: rgba(226, 232, 240, 0.8);

        --primary: #3182ce;
        --primary-hover: #2c5282;
        --primary-dark: #2a4e7c;
        --primary-light: #90cdf4;
        --primary-bg: #ebf8ff;

        --success: #48bb78;
        --warning: #ed8936;
        --error: #f56565;

        --card-bg: #ffffff;
        --code-bg: #2d3748;
        --code-block-bg: #1a202c;
        --code-header-bg: #2d3748;
        --code-header-text: #e2e8f0;
        --code-button-bg: #4a5568;
        --code-button-hover-bg: #718096;

        --table-header-bg: #f7fafc;

        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);

        /* 输入框和表单相关 */
        --input-bg: #ffffff;
        --focus-ring: 0 0 0 3px rgba(59, 130, 246, 0.1);
        --error-focus-ring: 0 0 0 3px rgba(239, 68, 68, 0.1);
        --primary-disabled: #94a3b8;
        --success-light: rgba(16, 185, 129, 0.1);
        --error-light: rgba(239, 68, 68, 0.1);

        /* CustomSelect组件相关变量 */
        --badge-bg: #f1f5f9;
        --hover-bg: #f8fafc;
        --selected-bg: rgba(59, 130, 246, 0.1);

        /* 滚动条样式 */
        --scrollbar-bg: #f1f5f9;
        --scrollbar-thumb: #cbd5e0;
        --scrollbar-thumb-hover: #a0aec0;
      }

      [data-theme="dark"] {
        --bg-primary: #0f1419;
        --bg-secondary: #1a1f2e;
        --bg-tertiary: #2d3748;
        --bg-quaternary: #4a5568;
        --bg-hover: #2d3748;
        --bg-active: #4a5568;
        --bg-accent: #1a365d;
        --bg-inverse: #ffffff;

        --text-primary: #f7fafc;
        --text-secondary: #e2e8f0;
        --text-tertiary: #a0aec0;
        --text-quaternary: #718096;
        --text-inverse: #1a202c;
        --text-placeholder: #718096;

        --border-primary: #2d3748;
        --border-secondary: #4a5568;
        --border-tertiary: #718096;
        --border-light: rgba(45, 55, 72, 0.8);
        --text-muted: #a0aec0;

        --primary: #90cdf4;
        --primary-hover: #63b3ed;
        --primary-dark: #3182ce;
        --primary-light: #2c5282;
        --primary-bg: #2c5282;

        --success: #68d391;
        --warning: #f6ad55;
        --error: #fc8181;

        --card-bg: #1a1f2e;
        --code-bg: #2d3748;
        --code-block-bg: #1a202c;
        --code-header-bg: #4a5568;
        --code-header-text: #e2e8f0;
        --code-button-bg: #718096;
        --code-button-hover-bg: #a0aec0;

        --table-header-bg: #2d3748;

        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);

        /* 输入框和表单相关 */
        --input-bg: #2d3748;
        --focus-ring: 0 0 0 3px rgba(144, 205, 244, 0.2);
        --error-focus-ring: 0 0 0 3px rgba(252, 129, 129, 0.2);
        --primary-disabled: #718096;
        --success-light: rgba(104, 211, 145, 0.1);
        --error-light: rgba(252, 129, 129, 0.1);

        /* CustomSelect组件相关变量 */
        --badge-bg: #2d3748;
        --hover-bg: #2d3748;
        --selected-bg: rgba(144, 205, 244, 0.2);

        /* 滚动条样式 */
        --scrollbar-bg: #2d3748;
        --scrollbar-thumb: #4a5568;
        --scrollbar-thumb-hover: #718096;
      }

      /* 滚动条样式实现 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--scrollbar-bg);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 4px;
        border: 1px solid var(--scrollbar-bg);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
      }

      ::-webkit-scrollbar-corner {
        background: var(--scrollbar-bg);
      }

      /* Firefox滚动条样式 */
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-bg);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
