version: '1.0'
name: cd-frontend-centos
displayName: Frontend CD for CentOS
triggers:
  trigger: auto
  push:
    tags:
      include:
        - v\d+\.\d+\.\d+
stages:
  - name: compile
    displayName: 编译
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 23.11.1
        commands:
          - npm install && rm -rf ./dist && npm run build
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        strategy: {}
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        strategy: {}
        dependsOn: build_nodejs
  - name: release
    displayName: 发布
    strategy: naturally
    trigger: auto
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: 发布
        dependArtifact: output
        version: 1.0.0.0
        autoIncrement: true
        strategy: {}
  - name: stage-73b278a9
    displayName: 部署
    strategy: naturally
    trigger: auto
    executor:
      - Chen-Christins
    steps:
      - step: deploy@agent
        name: deploy_agent
        displayName: 主机部署
        hostGroupID:
          ID: test-ci
          hostID:
            - 528124f7-2a4e-49bb-a674-070dd7f66ed4
        deployArtifact:
          - source: artifact
            name: output
            target: ~/gitee_go/deploy
            artifactRepository: default
            artifactName: output
            artifactVersion: latest
        script:
          - mkdir -p /home/chen/app
          - tar zxvf ~/gitee_go/deploy/output.tar.gz -C /home/chen/app
          - echo 'Deployment completed !!!'
        notify: []
        strategy:
          retry: '0'
